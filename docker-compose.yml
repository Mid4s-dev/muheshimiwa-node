version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: muheshimiwa-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mejja}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - muheshimiwa-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: muheshimiwa-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: mysql://${MYSQL_USERNAME:-root}:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/${MYSQL_DATABASE:-mejja}
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      # NextAuth
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      # SMTP
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      # Mobitech SMS
      MOBITECH_API_KEY: ${MOBITECH_API_KEY}
      MOBITECH_SHORTCODE: ${MOBITECH_SHORTCODE:-MOBI-TECH}
      MOBITECH_SERVICE_ID: ${MOBITECH_SERVICE_ID:-0}
      MOBITECH_VALIDATE_NUMBERS: ${MOBITECH_VALIDATE_NUMBERS:-false}
      MOBITECH_DLR_SECRET: ${MOBITECH_DLR_SECRET}
      # Admin credentials
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      # Public site URL for SEO
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./public:/app/public
    networks:
      - muheshimiwa-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      timeout: 10s
      retries: 3
      interval: 30s

volumes:
  mysql_data:
    driver: local

networks:
  muheshimiwa-network:
    driver: bridge
